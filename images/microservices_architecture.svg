<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250">
  <defs>
    <marker id="ms-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>
  <text x="350" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Microservices: ML System Architecture</text>

  <!-- Client -->
  <rect x="20" y="90" width="70" height="40" rx="6" fill="#555" fill-opacity="0.1" stroke="#555" stroke-width="1.5"/>
  <text x="55" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#555">Client</text>

  <line x1="90" y1="110" x2="128" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#ms-arr)"/>

  <!-- API Gateway -->
  <rect x="136" y="75" width="80" height="70" rx="10" fill="#f39c12" fill-opacity="0.12" stroke="#f39c12" stroke-width="2"/>
  <text x="176" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f39c12">API</text>
  <text x="176" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f39c12">Gateway</text>
  <text x="176" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f39c12">auth, rate limit</text>

  <!-- Services -->
  <line x1="216" y1="90" x2="268" y2="60" stroke="#666" stroke-width="1.2" marker-end="url(#ms-arr)"/>
  <line x1="216" y1="110" x2="268" y2="110" stroke="#666" stroke-width="1.2" marker-end="url(#ms-arr)"/>
  <line x1="216" y1="130" x2="268" y2="160" stroke="#666" stroke-width="1.2" marker-end="url(#ms-arr)"/>

  <!-- Feature Service -->
  <rect x="276" y="40" width="100" height="40" rx="8" fill="#3498db" fill-opacity="0.12" stroke="#3498db" stroke-width="1.5"/>
  <text x="326" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3498db">Feature Svc</text>
  <text x="326" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3498db">user + item features</text>

  <!-- Model Service -->
  <rect x="276" y="90" width="100" height="40" rx="8" fill="#27ae60" fill-opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="326" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#27ae60">Model Svc</text>
  <text x="326" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#27ae60">inference (GPU)</text>

  <!-- Logging Service -->
  <rect x="276" y="140" width="100" height="40" rx="8" fill="#9b59b6" fill-opacity="0.12" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="326" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#9b59b6">Logging Svc</text>
  <text x="326" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#9b59b6">metrics + events</text>

  <!-- Databases -->
  <line x1="376" y1="55" x2="428" y2="55" stroke="#666" stroke-width="1.2" marker-end="url(#ms-arr)"/>
  <line x1="376" y1="110" x2="428" y2="110" stroke="#666" stroke-width="1.2" marker-end="url(#ms-arr)"/>
  <line x1="376" y1="160" x2="428" y2="160" stroke="#666" stroke-width="1.2" marker-end="url(#ms-arr)"/>

  <rect x="436" y="40" width="85" height="35" rx="6" fill="#3498db" fill-opacity="0.06" stroke="#3498db" stroke-width="1"/>
  <text x="478" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3498db">Feature Store</text>
  <text x="478" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3498db">(Redis)</text>

  <rect x="436" y="92" width="85" height="35" rx="6" fill="#27ae60" fill-opacity="0.06" stroke="#27ae60" stroke-width="1"/>
  <text x="478" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">Model Store</text>
  <text x="478" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#27ae60">(S3 + registry)</text>

  <rect x="436" y="145" width="85" height="35" rx="6" fill="#9b59b6" fill-opacity="0.06" stroke="#9b59b6" stroke-width="1"/>
  <text x="478" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">Log Store</text>
  <text x="478" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#9b59b6">(Kafka + ES)</text>

  <!-- Message queue connecting services -->
  <rect x="560" y="82" width="90" height="55" rx="8" fill="#e74c3c" fill-opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="605" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#e74c3c">Message</text>
  <text x="605" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#e74c3c">Queue</text>
  <text x="605" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e74c3c">(Kafka)</text>

  <line x1="521" y1="65" x2="560" y2="95" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="521" y1="110" x2="560" y2="110" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="521" y1="160" x2="560" y2="125" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Key properties -->
  <text x="350" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Each service: independently deployable, independently scalable, owns its data</text>
  <text x="350" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Feature Svc scales with read QPS • Model Svc scales with GPU demand • Logging Svc scales with event volume</text>
</svg>