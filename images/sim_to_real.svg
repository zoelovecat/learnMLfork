<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 240" width="750" height="240">
  <defs>
    <marker id="str-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>
  <text x="375" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Sim-to-Real Transfer via Domain Randomisation</text>

  <!-- Simulation box -->
  <rect x="30" y="50" width="260" height="150" rx="12" fill="#3498db" fill-opacity="0.08" stroke="#3498db" stroke-width="2"/>
  <text x="160" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">Simulation</text>

  <!-- Multiple randomised variants -->
  <rect x="50" y="90" width="60" height="40" rx="6" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1"/>
  <text x="80" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3498db">friction=0.3</text>

  <rect x="120" y="90" width="60" height="40" rx="6" fill="#9b59b6" fill-opacity="0.15" stroke="#9b59b6" stroke-width="1"/>
  <text x="150" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">friction=0.8</text>

  <rect x="190" y="90" width="60" height="40" rx="6" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="1"/>
  <text x="220" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">friction=1.2</text>

  <rect x="50" y="140" width="60" height="40" rx="6" fill="#f39c12" fill-opacity="0.15" stroke="#f39c12" stroke-width="1"/>
  <text x="80" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f39c12">mass=0.5</text>

  <rect x="120" y="140" width="60" height="40" rx="6" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="1"/>
  <text x="150" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c">mass=1.5</text>

  <rect x="190" y="140" width="60" height="40" rx="6" fill="#1abc9c" fill-opacity="0.15" stroke="#1abc9c" stroke-width="1"/>
  <text x="220" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1abc9c">delay=20ms</text>

  <!-- Arrow to policy -->
  <line x1="290" y1="125" x2="340" y2="125" stroke="#666" stroke-width="2" marker-end="url(#str-arr)"/>

  <!-- Policy box -->
  <rect x="348" y="90" width="100" height="70" rx="10" fill="#f39c12" fill-opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="398" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f39c12">Robust</text>
  <text x="398" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f39c12">Policy</text>

  <!-- Arrow to real world -->
  <line x1="448" y1="125" x2="498" y2="125" stroke="#666" stroke-width="2" marker-end="url(#str-arr)"/>

  <!-- Real world box -->
  <rect x="506" y="50" width="210" height="150" rx="12" fill="#27ae60" fill-opacity="0.08" stroke="#27ae60" stroke-width="2"/>
  <text x="611" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">Real World</text>

  <rect x="556" y="100" width="110" height="50" rx="8" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="611" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">unknown friction,</text>
  <text x="611" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">mass, delays...</text>

  <text x="611" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">"just another variant"</text>

  <text x="375" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Train on many randomised simulations → policy generalises to the real (unknown) variant</text>
</svg>